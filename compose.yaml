services:
  postgres:
    image: postgres:17
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - db

  migrate:
    image: arigaio/atlas:latest
    command:
      - migrate
      - apply
      - --dir
      - file://migrations
      - --url
      - "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-pass}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-app}?sslmode=disable&search_path=public"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/:/migrations
    networks:
      - db

networks:
  db:
